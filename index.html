  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    /* Background Options */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("/resources/images/backgroundimage.jpg"); /* Replace with your image path */
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      /* Optional: Add a slight blur for a softer effect */
      filter: blur(6px);
    }
    
    .container {
      z-index: 1;
      background-color: rgba(38, 37, 39, 0.8); /* Semi-transparent white background */
      padding: 30px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
      color: #0e0d0d;
    }
    
    /* Cursive Font Option */
    @font-face {
      font-family: 'Bahnschrift'; /* Replace with your desired cursive font name */
      src: url("path/to/your/font.ttf") format("truetype"); /* Replace with font file path */
    }
    
    h1, li {
      font-family: 'Bahnschrift', cursive; /* Use the cursive font for headings and list items */
    }
    
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    li {
      margin-bottom: 15px;
      font-size: 16px;
    }
    
    a {
      text-decoration: none;
      color: #007bff;
    }
