<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | [Your Name]</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    
    /* Background Options */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url("path/to/your/image.jpg"); /* Replace with your image path */
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      /* Optional: Add a slight blur for a softer effect */
      filter: blur(2px);
    }
    
    .container {
      background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent white background */
      padding: 30px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
      color: #333;
    }
    
    /* Cursive Font Option */
    @font-face {
      font-family: 'Great Vibes'; /* Replace with your desired cursive font name */
      src: url("path/to/your/font.ttf") format("truetype"); /* Replace with font file path */
    }
    
    h1, li {
      font-family: 'Great Vibes', cursive; /* Use the cursive font for headings and list items */
    }
    
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    li {
      margin-bottom: 15px;
      font-size: 16px;
    }
    
    a {
      text-decoration: none;
      color: #007bff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Contact | [Your Name]</h1>
    <ul>
      <li>Email: <a href="mailto:youremail@example.com">youremail@example.com</a></li>
      <li>Telegram: <a href="https://t.me/your_telegram_id">your_telegram_id</a></li>
    </ul>
  </div>

</body>
</html>
